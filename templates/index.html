<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CambiaQ – Conversor de Moneda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #131826;
      --surface2: #1a2035;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --teal: #3dd6c8;
      --text: #e8e6df;
      --muted: #6b7280;
      --border: rgba(201,168,76,0.18);
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(61,214,200,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(201,168,76,0.09) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 900px;
      padding: 48px 24px 16px;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--gold), var(--teal));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(120deg, var(--gold-light) 30%, var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 6px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    main {
      width: 100%;
      max-width: 860px;
      padding: 0 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* ── Main Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px;
      margin-top: 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--teal), var(--gold));
      background-size: 200%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: end;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--gold);
    }

    input[type="number"],
    select {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 14px 18px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    input[type="number"]:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }

    input[type="number"] {
      font-size: 1.5rem;
      font-weight: 300;
      font-family: 'Playfair Display', serif;
    }

    /* Swap button */
    .swap-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--gold);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .swap-btn:hover {
      background: var(--gold);
      color: var(--bg);
      transform: rotate(180deg);
    }

    .convert-btn {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: #0b0f1a;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .convert-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .convert-btn:active { transform: translateY(0); }

    .convert-btn.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.3) 50%, transparent 75%);
      background-size: 200%;
      animation: btnShimmer 1s linear infinite;
    }

    @keyframes btnShimmer {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* Result */
    .result-box {
      margin-top: 28px;
      background: linear-gradient(135deg, rgba(61,214,200,0.06), rgba(201,168,76,0.06));
      border: 1px solid rgba(61,214,200,0.2);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      display: none;
      animation: fadeUp 0.4s ease;
    }

    .result-box.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-amount {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--teal);
      line-height: 1.1;
    }

    .result-formula {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .result-rate {
      margin-top: 12px;
      display: inline-block;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      color: var(--gold-light);
    }

    .result-updated {
      margin-top: 8px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius);
      padding: 14px 20px;
      color: #fca5a5;
      font-size: 0.9rem;
      margin-top: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* Rates table */
    .rates-section {
      margin-top: 32px;
    }

    .rates-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .rates-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text);
    }

    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: rgba(201,168,76,0.1); }

    .rates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .rate-card {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 14px 16px;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .rate-card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
    }

    .rate-code {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .rate-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      margin-top: 2px;
      color: var(--text);
    }

    .rate-name {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 200%;
      animation: skel 1.2s infinite;
      border-radius: 8px;
    }

    @keyframes skel {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.75rem;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 580px) {
      .row { grid-template-columns: 1fr; }
      .swap-btn { transform: rotate(90deg); margin: 0 auto; }
      .swap-btn:hover { transform: rotate(270deg); }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <div class="logo-icon">💱</div>
  </div>
  <h1>CambiaQ</h1>
  <p class="tagline">Conversor de divisas en tiempo real · Programación VI · USAC-EFPEM · Helary Castro 202308320</p>
</header>

<main>
  <div class="card">
    <div class="row">
      <!-- Monto + moneda origen -->
      <div>
        <div class="field">
          <label>Cantidad</label>
          <input type="number" id="cantidad" value="1" min="0.0001" step="any" placeholder="0.00"/>
        </div>
        <div class="field" style="margin-top:12px;">
          <label>De</label>
          <select id="origen">
            {% for code, name in monedas.items() %}
            <option value="{{ code }}" {% if code == 'USD' %}selected{% endif %}>{{ code }} – {{ name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Swap -->
      <button class="swap-btn" id="swapBtn" title="Intercambiar monedas">⇄</button>

      <!-- Moneda destino -->
      <div class="field">
        <label>A</label>
        <select id="destino">
          {% for code, name in monedas.items() %}
          <option value="{{ code }}" {% if code == 'GTQ' %}selected{% endif %}>{{ code }} – {{ name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <button class="convert-btn" id="convertBtn">Convertir</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-amount" id="resultAmount"></div>
      <div class="result-formula" id="resultFormula"></div>
      <span class="result-rate" id="resultRate"></span>
      <div class="result-updated" id="resultUpdated"></div>
    </div>
  </div>

  <!-- Tabla de tasas -->
  <div class="rates-section">
    <div class="rates-header">
      <span class="rates-title">Tasas actuales desde <span id="ratesBase">USD</span></span>
      <button class="refresh-btn" id="refreshBtn">↻ Actualizar</button>
    </div>
    <div class="rates-grid" id="ratesGrid">
      <!-- Skeleton placeholders -->
      {% for i in range(15) %}
      <div class="rate-card skeleton" style="height:72px;"></div>
      {% endfor %}
    </div>
    <p style="font-size:0.7rem;color:var(--muted);margin-top:10px;">
      Datos proporcionados por <a href="https://open.er-api.com" target="_blank" style="color:var(--gold);text-decoration:none;">open.er-api.com</a>
    </p>
  </div>
</main>

<footer>
  Proyecto Final – Programación VI &nbsp;·&nbsp; Lic. Lusvin de León &nbsp;·&nbsp; USAC-EFPEM 2026
</footer>

<script>
  const NOMBRES = {{ monedas | tojson }};

  const origenSel = document.getElementById('origen');
  const destinoSel = document.getElementById('destino');
  const cantidadInp = document.getElementById('cantidad');
  const convertBtn = document.getElementById('convertBtn');
  const swapBtn = document.getElementById('swapBtn');
  const resultBox = document.getElementById('resultBox');
  const errorMsg = document.getElementById('errorMsg');
  const ratesGrid = document.getElementById('ratesGrid');
  const ratesBase = document.getElementById('ratesBase');
  const refreshBtn = document.getElementById('refreshBtn');

  function fmt(n, decimals = 4) {
    return new Intl.NumberFormat('es-GT', { minimumFractionDigits: 2, maximumFractionDigits: decimals }).format(n);
  }

  async function convertir() {
    const cantidad = parseFloat(cantidadInp.value);
    const origen = origenSel.value;
    const destino = destinoSel.value;

    errorMsg.classList.remove('visible');
    resultBox.classList.remove('visible');
    convertBtn.classList.add('loading');
    convertBtn.textContent = 'Obteniendo tasa…';

    try {
      const res = await fetch('/convertir', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ cantidad, origen, destino })
      });
      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Error al convertir.';
        errorMsg.classList.add('visible');
        return;
      }

      document.getElementById('resultAmount').textContent =
        `${fmt(data.resultado, 4)} ${data.destino}`;
      document.getElementById('resultFormula').textContent =
        `${fmt(data.cantidad, 2)} ${data.origen} = ${fmt(data.resultado, 4)} ${data.destino}`;
      document.getElementById('resultRate').textContent =
        `1 ${data.origen} = ${fmt(data.tasa, 6)} ${data.destino}`;
      document.getElementById('resultUpdated').textContent =
        `Última actualización: ${data.actualizado}`;

      resultBox.classList.add('visible');
      cargarTasas();

    } catch (e) {
      errorMsg.textContent = 'No se pudo conectar con el servidor. Verifica tu conexión.';
      errorMsg.classList.add('visible');
    } finally {
      convertBtn.classList.remove('loading');
      convertBtn.textContent = 'Convertir';
    }
  }

  async function cargarTasas() {
    const base = origenSel.value;
    ratesBase.textContent = base;
    ratesGrid.innerHTML = '';

    // Skeletons
    for (let i = 0; i < 15; i++) {
      const sk = document.createElement('div');
      sk.className = 'rate-card skeleton';
      sk.style.height = '72px';
      ratesGrid.appendChild(sk);
    }

    try {
      const res = await fetch('/todas_tasas', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ base })
      });
      const data = await res.json();
      ratesGrid.innerHTML = '';

      Object.entries(data.tasas).sort().forEach(([code, rate]) => {
        const card = document.createElement('div');
        card.className = 'rate-card';
        card.innerHTML = `
          <div class="rate-code">${code}</div>
          <div class="rate-value">${fmt(rate, 4)}</div>
          <div class="rate-name">${(NOMBRES[code] || '').replace(/\s*[🌍🌎🌏🇺🇸🇬🇹🇪🇺🇲🇽🇬🇧🇯🇵🇨🇦🇧🇷🇨🇴🇦🇷🇨🇱🇵🇪🇨🇭🇨🇳🇭🇳]+/g,'').trim()}</div>
        `;
        card.addEventListener('click', () => {
          destinoSel.value = code;
          convertir();
        });
        ratesGrid.appendChild(card);
      });

    } catch (e) {
      ratesGrid.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">No se pudieron cargar las tasas.</p>';
    }
  }

  // Swap
  swapBtn.addEventListener('click', () => {
    [origenSel.value, destinoSel.value] = [destinoSel.value, origenSel.value];
    cargarTasas();
  });

  convertBtn.addEventListener('click', convertir);
  refreshBtn.addEventListener('click', cargarTasas);
  cantidadInp.addEventListener('keydown', e => e.key === 'Enter' && convertir());

  // Cargar tasas al inicio
  cargarTasas();
</script>
</body>
</html>
